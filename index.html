<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Anonymous Book Group</title>

<style>
:root{
    --primary:#1f3c5c;
    --secondary:#b28a2e;
    --background:#f4f6f8;
    --card:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI, Arial, sans-serif;
    background:var(--background);
    color:#333;
}

header{
    background:var(--primary);
    color:white;
    text-align:center;
    padding:35px 20px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

header h1{
    font-size:3rem;
}

header p{
    margin-top:10px;
    font-size:1.1rem;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:25px;
}

.section-title{
    text-align:center;
    color:var(--primary);
    margin:30px 0 10px;
}

.section-description{
    text-align:center;
    color:#666;
    margin-bottom:20px;
}

.members{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    margin-bottom:40px;
}

.member-card{
    background:var(--card);
    border-radius:12px;
    padding:20px;
    text-align:center;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 3px 10px rgba(0,0,0,.12);
}

.member-card:hover{
    transform:translateY(-5px);
}

.member-card img{
    width:90px;
    height:90px;
    object-fit:contain;
    margin-bottom:10px;
}

.member-card h3{
    color:var(--primary);
}

.year-buttons{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin-bottom:30px;
}

.year-btn{
    background:var(--secondary);
    color:white;
    border:none;
    border-radius:8px;
    padding:12px 24px;
    cursor:pointer;
    font-size:1rem;
    font-weight:bold;
}

.year-btn:hover{
    background:#8f6f22;
}

#resultsTitle{
    text-align:center;
    color:var(--primary);
    margin-bottom:25px;
}

.books{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:25px;
    margin-bottom:40px;
}

.book-card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.book-cover{
    height:420px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fafafa;
    padding:15px;
}

.book-cover img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

.book-info{
    padding:15px;
}

.book-info h3{
    color:var(--primary);
    margin-bottom:10px;
}

.book-info p{
    margin:6px 0;
}

.empty{
    grid-column:1/-1;
    text-align:center;
    font-size:1.2rem;
    color:#666;
}

footer{
    text-align:center;
    background:var(--primary);
    color:white;
    padding:20px;
}
</style>
</head>

<body>

<header>
    <h1>The Anonymous Book Group</h1>
    <p>Browse our reading history by member or by year.</p>
</header>

<div class="container">

    <h2 class="section-title">Browse by Member</h2>
    <p class="section-description">
        Click a member to see all of their book selections.
    </p>

    <div class="members" id="membersContainer"></div>

    <h2 class="section-title">Browse by Year</h2>
    <p class="section-description">
        Click a year to see all books selected during that year.
    </p>

    <div class="year-buttons">
        <button class="year-btn" onclick="showYear(2022)">2022</button>
        <button class="year-btn" onclick="showYear(2023)">2023</button>
        <button class="year-btn" onclick="showYear(2024)">2024</button>
        <button class="year-btn" onclick="showYear(2025)">2025</button>
        <button class="year-btn" onclick="showYear(2026)">2026</button>
    </div>

    <h2 id="resultsTitle">Select a Member or Year</h2>

    <div class="books" id="bookGrid"></div>

</div>

<footer>
    The Anonymous Book Group
</footer>

function loadMembers(){

    const container =
        document.getElementById("membersContainer");

    members.forEach(member => {

        const card = document.createElement("div");

        card.className = "member-card";

        card.innerHTML = `
            <img src="${member.icon}" alt="${member.name}">
            <h3>${member.name}</h3>
        `;

        card.onclick = () => showMember(member.name);

        container.appendChild(card);

    });
}

function displayBooks(bookList){

    const grid =
        document.getElementById("bookGrid");

    grid.innerHTML = "";

    if(bookList.length === 0){

        grid.innerHTML =
            '<div class="empty">No books found.</div>';

        return;
    }

    bookList.forEach(book => {

        const card =
            document.createElement("div");

        card.className = "book-card";

        card.innerHTML = `
            <div class="book-cover">
                <img src="${book.image}" alt="${book.title}">
            </div>

            <div class="book-info">
                <h3>${book.title}</h3>
                <p><strong>Author:</strong> ${book.author}</p>
                <p><strong>Member:</strong> ${book.member}</p>
                <p><strong>Year:</strong> ${book.year}</p>
            </div>
        `;

        grid.appendChild(card);

    });
}

function showYear(year){

    document.getElementById("resultsTitle").textContent =
        "Books Selected in " + year;

    const results =
        books.filter(book => book.year === year);

    displayBooks(results);
}

function showMember(member){

    document.getElementById("resultsTitle").textContent =
        member + "'s Book Selections";

    const results =
        books.filter(book => book.member === member);

    displayBooks(results);
}
